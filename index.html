<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FoodMatch 🍽️ — Tu manges ou pas ?</title>
  <meta name="description" content="Tinder, mais pour la bouffe. Swipe pour décider ce que tu manges ce soir.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fire: #ff5500;
      --fire2: #ff2200;
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1e1e1e;
      --text: #f0ece4;
      --muted: #555;
      --card-h: 470px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      padding: 0 18px;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0 0;
      flex-shrink: 0;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .logo span { color: var(--fire); }
    .logo small { display: block; font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; font-weight: 400; margin-top: 2px; }
    .score-badge { text-align: right; }
    .score-badge strong { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--fire); }
    .score-badge small { display: block; font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    /* ─── TABS ───────────────────────────────── */
    .tabs {
      width: 100%;
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-top: 14px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1; background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted); padding: 9px 0;
      font-size: 11px; font-family: 'DM Sans', sans-serif;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
    }
    .tab.active { color: var(--fire); border-bottom-color: var(--fire); }

    /* ─── CARD AREA ──────────────────────────── */
    #card-area {
      position: relative;
      width: 100%;
      height: var(--card-h);
      margin-top: 18px;
      flex-shrink: 0;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      overflow: hidden;
      cursor: grab;
      will-change: transform;
      box-shadow: 0 20px 60px rgba(0,0,0,.7);
      transform-origin: center bottom;
      touch-action: none;
    }
    .card:active { cursor: grabbing; }
    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .card-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.35) 50%, transparent 100%);
      pointer-events: none;
    }
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 22px 20px 24px;
      pointer-events: none;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 21px; font-weight: 700;
      line-height: 1.2; margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .card-tags { display: flex; gap: 7px; flex-wrap: wrap; }
    .tag {
      border-radius: 99px; padding: 3px 11px;
      font-size: 10px; letter-spacing: .8px; font-weight: 500;
    }
    .tag-cat { background: rgba(255,85,0,.2); color: #ffaa66; border: 1px solid rgba(255,85,0,.35); }
    .tag-area { background: rgba(255,255,255,.08); color: #aaa; border: 1px solid rgba(255,255,255,.12); }

    /* hint labels */
    .hint {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-weight: 900; font-size: 30px;
      padding: 7px 18px; border-radius: 10px;
      border-width: 4px; border-style: solid;
      pointer-events: none;
      opacity: 0;
      transition: opacity .1s;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .hint-eat { top: 26px; left: 18px; color: var(--fire); border-color: var(--fire); transform: rotate(-14deg); }
    .hint-pass { top: 26px; right: 18px; color: rgba(255,255,255,.85); border-color: rgba(255,255,255,.7); transform: rotate(14deg); }

    /* stack cards */
    .card-stack-2 {
      transform: translateY(-12px) scale(0.95);
      z-index: 1; cursor: default;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }
    .card-stack-3 {
      transform: translateY(-22px) scale(0.90);
      z-index: 0; cursor: default;
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }
    .card-top { z-index: 2; }

    /* ─── BUTTONS ────────────────────────────── */
    .actions {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-top: 20px; flex-shrink: 0;
    }
    .btn {
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.92) !important; }
    .btn-pass {
      width: 58px; height: 58px;
      background: var(--surface); border: 2px solid #333;
      font-size: 22px; color: #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,.5);
    }
    .btn-pass:hover { transform: scale(1.1); }
    .btn-eat {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, var(--fire), var(--fire2));
      font-size: 32px;
      box-shadow: 0 6px 28px rgba(255,85,0,.55);
    }
    .btn-eat:hover { transform: scale(1.1); box-shadow: 0 8px 36px rgba(255,85,0,.7); }
    .btn-sm {
      width: 48px; height: 48px;
      background: var(--surface); border: 2px solid #2a2a2a;
      font-size: 18px;
    }
    .btn-sm:hover { transform: scale(1.08); }

    .action-labels {
      display: flex; justify-content: space-between;
      width: 200px; margin-top: 8px;
      font-size: 9px; color: #3a3a3a;
      letter-spacing: 2px; text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ─── STATS BAR ──────────────────────────── */
    .stats-bar { width: 100%; margin-top: 14px; flex-shrink: 0; }
    .stats-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 5px;
    }
    .stats-labels span:last-child { color: var(--fire); }
    .bar-track { height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--fire2), var(--fire)); border-radius: 2px; transition: width .6s ease; }

    /* ─── EMPTY / LOADING ────────────────────── */
    #loader, #empty {
      position: absolute; inset: 0;
      border-radius: 22px; background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      z-index: 5;
    }
    #loader .spin { font-size: 48px; animation: spin 1s linear infinite; }
    #empty .emoji { font-size: 48px; }
    #empty p { color: var(--fire); font-family: 'Playfair Display', serif; font-size: 18px; }

    /* ─── LIST TAB ───────────────────────────── */
    #list-view {
      display: none; width: 100%;
      overflow-y: auto; flex: 1;
      padding: 16px 0 40px;
    }
    #list-view.visible { display: block; }
    .list-header { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    .list-empty { text-align: center; padding: 60px 0; color: #3a3a3a; }
    .list-empty p { font-size: 14px; margin-top: 10px; }
    .list-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border-radius: 14px;
      padding: 10px; border: 1px solid var(--border);
      margin-bottom: 10px;
      animation: fadeUp .25s ease;
    }
    .list-item img { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .list-item-info { flex: 1; min-width: 0; }
    .list-item-name { font-weight: 500; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-item-sub { font-size: 10px; color: #ff9944; margin-top: 5px; }

    /* ─── BURST ──────────────────────────────── */
    .burst {
      position: fixed; top: 50%; left: 50%;
      width: 160px; height: 160px;
      margin: -80px 0 0 -80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,85,0,.5) 0%, transparent 70%);
      pointer-events: none; z-index: 99;
      animation: burst .65s ease-out forwards;
    }

    /* ─── KEYFRAMES ──────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes burst { 0% { transform: translate(-50%,-50%) scale(.5); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }
    @keyframes flyRight { to { transform: translateX(120vw) rotate(30deg); opacity: 0; } }
    @keyframes flyLeft  { to { transform: translateX(-120vw) rotate(-30deg); opacity: 0; } }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      🍽️ <span>Food</span>Match
      <small>Tu manges ou pas ?</small>
    </div>
    <div class="score-badge">
      <strong id="eat-count">0</strong>
      <small>Yummy</small>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-swipe" onclick="switchTab('swipe')">🔀 Swipe</button>
    <button class="tab" id="tab-list" onclick="switchTab('list')">❤️ Ma liste (<span id="list-count">0</span>)</button>
  </div>

  <!-- SWIPE VIEW -->
  <div id="swipe-view" style="width:100%;display:flex;flex-direction:column;align-items:center;flex:1;overflow:hidden;">

    <!-- CARD STACK -->
    <div id="card-area">
      <div id="loader"><div class="spin">🍳</div></div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions">
      <button class="btn btn-pass" onclick="swipeCard('left')" title="Pass">✕</button>
      <button class="btn btn-sm btn-pass" onclick="swipeCard('left')">😐</button>
      <button class="btn btn-eat" onclick="swipeCard('right')" title="Je mange !">🔥</button>
      <button class="btn btn-sm btn-pass" onclick="swipeCard('right')">❤️</button>
      <button class="btn btn-sm btn-pass" onclick="swipeCard('right')" style="color:var(--fire)">★</button>
    </div>
    <div class="action-labels"><span>← Pass</span><span>Je mange →</span></div>

    <!-- STATS -->
    <div class="stats-bar" id="stats-bar" style="opacity:0;transition:opacity .4s">
      <div class="stats-labels">
        <span id="pass-label">0 passés</span>
        <span id="pct-label">0% yummy</span>
        <span id="eat-label">0 mangés</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    </div>

  </div><!-- /swipe-view -->

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="list-empty" id="list-empty">
      <div style="font-size:48px">🍽️</div>
      <p>Swipe à droite pour remplir ta liste !</p>
    </div>
    <div id="list-header" class="list-header" style="display:none"></div>
    <div id="list-items"></div>
  </div>

</div><!-- /app -->

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  deck: [],      // array of meal objects (bottom to top)
  eats: [],
  passes: [],
  loading: false,
  swiping: false,
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function fetchMeal() {
  const r = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
  const d = await r.json();
  return d.meals[0];
}

async function fillDeck() {
  if (state.loading) return;
  state.loading = true;
  const needed = Math.max(0, 3 - state.deck.length);
  if (needed > 0) {
    const meals = await Promise.all(Array.from({length: needed + 1}, fetchMeal));
    const ids = new Set(state.deck.map(m => m.idMeal));
    meals.filter(m => !ids.has(m.idMeal)).forEach(m => state.deck.push(m));
  }
  state.loading = false;
  renderDeck();
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function createCardEl(meal, role) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = meal.idMeal;
  div.innerHTML = `
    <img src="${meal.strMealThumb}" alt="${meal.strMeal}" draggable="false">
    <div class="card-gradient"></div>
    <div class="hint hint-eat">JE MANGE</div>
    <div class="hint hint-pass">PASS</div>
    <div class="card-info">
      <div class="card-name">${meal.strMeal}</div>
      <div class="card-tags">
        ${meal.strCategory ? `<span class="tag tag-cat">${meal.strCategory}</span>` : ''}
        ${meal.strArea    ? `<span class="tag tag-area">🌍 ${meal.strArea}</span>` : ''}
      </div>
    </div>`;
  if (role === 'top')    { div.classList.add('card-top');     attachDrag(div, meal); }
  if (role === 'second') div.classList.add('card-stack-2');
  if (role === 'third')  div.classList.add('card-stack-3');
  return div;
}

function renderDeck() {
  const area = document.getElementById('card-area');
  // remove existing cards (keep loader/empty)
  area.querySelectorAll('.card').forEach(c => c.remove());
  document.getElementById('loader').style.display = 'none';

  const empty = getOrCreateEmpty();
  if (state.deck.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  const n = state.deck.length;
  // render bottom card first (lowest z)
  if (n >= 3) area.appendChild(createCardEl(state.deck[n-3], 'third'));
  if (n >= 2) area.appendChild(createCardEl(state.deck[n-2], 'second'));
  area.appendChild(createCardEl(state.deck[n-1], 'top'));
}

function getOrCreateEmpty() {
  let el = document.getElementById('empty');
  if (!el) {
    el = document.createElement('div');
    el.id = 'empty';
    el.innerHTML = `<div class="emoji">🥂</div><p>Chargement...</p>`;
    document.getElementById('card-area').appendChild(el);
  }
  return el;
}

// ─── DRAG / SWIPE ─────────────────────────────────────────────────────────────
function attachDrag(el, meal) {
  let startX, startY, curX = 0, curY = 0, dragging = false, raf;
  const hintEat  = el.querySelector('.hint-eat');
  const hintPass = el.querySelector('.hint-pass');

  function setTransform(x, y, tr = '') {
    el.style.transition = tr;
    el.style.transform  = `translate(${x}px, ${y * .35}px) rotate(${x * .11}deg)`;
    curX = x; curY = y;
    // hints
    const p = Math.min(Math.abs(x) / 80, 1);
    hintEat.style.opacity  = x >  40 ? p : 0;
    hintPass.style.opacity = x < -40 ? p : 0;
  }

  function onStart(e) {
    if (state.swiping) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY;
    dragging = true;
    el.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => setTransform(dx, dy));
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(curX) > 90) {
      doSwipe(el, meal, curX > 0 ? 'right' : 'left');
    } else {
      setTransform(0, 0, 'transform .5s cubic-bezier(.175,.885,.32,1.275)');
      hintEat.style.opacity = hintPass.style.opacity = 0;
    }
  }

  el.addEventListener('touchstart', onStart, {passive:false});
  el.addEventListener('touchmove',  onMove,  {passive:false});
  el.addEventListener('touchend',   onEnd);
  el.addEventListener('mousedown',  onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onEnd);
}

// ─── SWIPE LOGIC ──────────────────────────────────────────────────────────────
function doSwipe(el, meal, dir) {
  if (state.swiping) return;
  state.swiping = true;

  // animate fly
  const tx = dir === 'right' ? '110vw' : '-110vw';
  const rot = dir === 'right' ? '28deg' : '-28deg';
  el.style.transition = 'transform .38s cubic-bezier(.4,0,.6,1), opacity .38s ease';
  el.style.transform  = `translateX(${tx}) rotate(${rot})`;
  el.style.opacity    = '0';

  if (dir === 'right') {
    state.eats.push(meal);
    addBurst();
  } else {
    state.passes.push(meal);
  }

  // remove from deck
  state.deck = state.deck.filter(m => m.idMeal !== meal.idMeal);

  setTimeout(() => {
    state.swiping = false;
    renderDeck();
    updateStats();
    updateList();
    if (state.deck.length < 2) fillDeck();
  }, 400);
}

function swipeCard(dir) {
  if (state.swiping || state.deck.length === 0) return;
  const meal = state.deck[state.deck.length - 1];
  const el = document.querySelector('.card-top');
  if (!el) return;
  doSwipe(el, meal, dir);
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const total = state.eats.length + state.passes.length;
  const pct   = total ? Math.round(state.eats.length / total * 100) : 0;
  document.getElementById('eat-count').textContent  = state.eats.length;
  document.getElementById('list-count').textContent = state.eats.length;
  document.getElementById('eat-label').textContent  = state.eats.length + ' mangés';
  document.getElementById('pass-label').textContent = state.passes.length + ' passés';
  document.getElementById('pct-label').textContent  = pct + '% yummy';
  document.getElementById('bar-fill').style.width   = pct + '%';
  if (total > 0) document.getElementById('stats-bar').style.opacity = '1';
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
function updateList() {
  document.getElementById('tab-list').querySelector('span').textContent = state.eats.length;
  const empty  = document.getElementById('list-empty');
  const header = document.getElementById('list-header');
  const items  = document.getElementById('list-items');

  if (state.eats.length === 0) { empty.style.display = 'block'; header.style.display = 'none'; return; }
  empty.style.display  = 'none';
  header.style.display = 'block';
  header.textContent   = state.eats.length + ' plat' + (state.eats.length > 1 ? 's' : '') + ' dans ta liste';
  items.innerHTML = '';
  state.eats.forEach(meal => {
    const d = document.createElement('div');
    d.className = 'list-item';
    d.innerHTML = `
      <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
      <div class="list-item-info">
        <div class="list-item-name">${meal.strMeal}</div>
        <div class="list-item-sub">${meal.strCategory || ''} ${meal.strArea ? '· ' + meal.strArea : ''}</div>
      </div>
      <span style="font-size:18px">🔥</span>`;
    items.appendChild(d);
  });
}

// ─── BURST ────────────────────────────────────────────────────────────────────
function addBurst() {
  const b = document.createElement('div');
  b.className = 'burst';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 700);
}

// ─── TAB SWITCH ───────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('swipe-view').style.display = t === 'swipe' ? 'flex' : 'none';
  document.getElementById('list-view').classList.toggle('visible', t === 'list');
  document.getElementById('tab-swipe').classList.toggle('active', t === 'swipe');
  document.getElementById('tab-list').classList.toggle('active',  t === 'list');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
fillDeck();
</script>
</body>
</html>
